version: '3.8'

services:
  aixray-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aixray-v2
    restart: unless-stopped
    ports:
      - "5000:80"
    volumes:
      - ./backend/weights:/app/backend/weights
      - aixray-static:/app/backend/static
      - aixray-data:/app/backend/data
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-aixray-detection-v2-secret-key-2024}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-aixray-jwt-secret-key-2024}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_ENCRYPTION_KEY=${LLM_ENCRYPTION_KEY:-aixray-llm-encryption-secret-key-2024}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  aixray-static:
    driver: local
  aixray-data:
    driver: local
